# yolo11_inference Configuration Template
# Copy this file to config.yaml and adjust the values for your environment
#
# Machine-specific overrides: create a sibling config.local.yaml (gitignored)
# with only the keys that differ on this station (e.g. exposure_time, gain,
# output_dir). Top-level keys in config.local.yaml replace the ones in
# config.yaml at load time.

# YOLO Model Weights Path (relative to project root or absolute path)
# Example: models/LED/A/yolo/LED_color_mixing_best.pt
weights: "models/LED/A/yolo/weights/LED_color_mixing_v1.0.0_20260210.onnx"

# Camera Settings
# Exposure time in microseconds (e.g., 51170 = 51.17ms)
exposure_time: "51170.0000"

# Gain value (adjust based on lighting conditions)
# Typical range: 0-24, higher values increase brightness but may introduce noise
gain: "23.0"

# Camera image acquisition timeout in milliseconds
MV_CC_GetImageBuffer_nMsec: 10000

# Camera resilience (async pipeline)
# Consecutive capture failures before the camera counts as lost.
# Worst-case detection latency is roughly threshold x MV_CC_GetImageBuffer_nMsec.
camera_lost_threshold: 5
# Automatic reconnect attempts once the lost threshold is reached.
# 0 disables auto-reconnect (camera-lost is reported immediately).
camera_reconnect_attempts: 0
# Base seconds between reconnect attempts; doubles per attempt (2s, 4s, 8s...)
camera_reconnect_backoff: 2.0

# General timeout setting (seconds)
timeout: 1

# Image Resolution
width: 3072
height: 2048

# Inference Backend Flags
enable_yolo: true
enable_anomalib: false

# Model Cache Settings
# Maximum number of models to keep in memory (LRU eviction)
max_cache_size: 3

# Output Directory (relative to project root or absolute path)
# Use environment variable: ${PROJECT_ROOT}/Result
# Or relative path: ./Result
# Or absolute path: D:/Path/To/Result
output_dir: "./Result"

# PCBA inspection product config example:
# See configs/products/pcba_example.yaml for expected_items, position_config,
# alignment, and missing_slot_check structure. Copy measured values into the
# active config or model-specific config before enabling production checks.
#
# Production scope declaration. This does not add detection capability by
# itself; it prevents confusing a YOLO presence/position model with full AOI.
# defect_coverage:
#   covered:
#     - missing_component
#     - wrong_component
#     - position_shift
#     - unexpected_component
#   not_covered:
#     - solder_quality
#     - scratch
#     - contamination
#     - polarity_mark

# Advanced Settings (Optional)

# Inference Image Size (for letterbox preprocessing)
# imgsz: 640

# Device Selection
# Options: "auto", "cpu", "cuda", "cuda:0", "cuda:1", etc.
# device: "auto"
# For exported YOLO OpenVINO directories, use "intel:cpu", "intel:gpu" or
# "intel:npu" when targeting Intel runtime explicitly.

# Mixed Precision Inference (FP16 for GPU acceleration)
# use_amp: true

# Logging Level
# Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
# log_level: "INFO"

# Auto-Trigger Configuration
# Enables hands-free inspection: product placed under camera → auto-detected
# → stability gate → single inspection → wait for removal → repeat.
#
# Set enabled: true and tune the thresholds for your specific product/lighting.
# roi: [x, y, w, h] — region of interest in pixels; [0,0,0,0] = full frame.
# appear_frames: consecutive frames with product before advancing to WAIT_STABLE.
# stable_frames: consecutive low-motion, sharp frames required to trigger.
# remove_frames: consecutive frames without product before resetting.
# motion_threshold: ROI absdiff mean < this value = stable (lower = stricter).
# sharpness_threshold: Laplacian variance > this value = sharp (higher = stricter).
# product_area_threshold: total Canny contour area > this = product present.
# inspection_cooldown_ms: minimum ms between successive inspection triggers.
#
# auto_trigger:
#   enabled: false
#   roi: [0, 0, 0, 0]
#   frame_buffer_size: 15
#   appear_frames: 5
#   stable_frames: 12
#   remove_frames: 8
#   motion_threshold: 3.0
#   sharpness_threshold: 100.0
#   product_area_threshold: 5000
#   inspection_cooldown_ms: 500

# Optional per-model color checker overrides.
# Prefer placing these in models/<product>/<area>/<type>/config.yaml when a
# threshold/rule applies only to one model bundle.
# color_threshold_overrides:
#   red: 0.91
#   blue: 0.88
#
# color_rules_overrides:
#   red:
#     min_area: 3
#
# Production default: if color check is enabled but the color model/rules cannot
# load, mark the inspection as FAIL instead of silently passing color validation.
# color_fail_closed: true
